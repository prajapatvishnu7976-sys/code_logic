name: smart_prep_pro
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lottie: ^3.1.2
  pinput: ^5.0.0
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.0.0

  # 🔥 Firebase Services
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  cloud_functions: ^5.0.0
  firebase_messaging: ^15.2.10
  youtube_player_flutter: ^9.0.0

  # 🔗 Social & Sharing
  share_plus: ^7.2.1

  # 🔔 Notifications
  flutter_local_notifications: ^17.1.0
  
  # Google Services
  google_sign_in: ^6.2.1
  google_mobile_ads: ^5.1.0
  
  # UI & Charts
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  fluttertoast: ^8.2.10
  
  # Utils & Storage
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.2 
  
  # 💳 Payment Gateway
  razorpay_flutter: ^1.3.10
  change_app_package_name: ^1.5.0

# 🔥 IMPORTANT: Win32 fix for Dart 3
dependency_overrides:
  win32: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  # ✅ Native Splash dependency added
  flutter_native_splash: ^2.4.0
  change_app_package_name: ^1.1.0

# 🚀 APP ICON CONFIG
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

# 🚀 NATIVE SPLASH CONFIG (White screen fix)
flutter_native_splash:
  color: "#0F172A" # Dark blue background (Splash matching)
  image: "assets/app_icon.png"
  android_12:
    image: "assets/app_icon.png"
    color: "#0F172A"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png